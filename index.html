<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Course XX</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        
        /* Header */
        header { background-color: #002147; color: white; padding: 20px; text-align: center; border-bottom: 5px solid #ffcc00; }
        
        /* Navigation */
        nav { background: #333; padding: 10px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; transition: 0.3s; }
        nav a:hover { color: #ffcc00; font-weight: bold; } /* الـ Hover المطلوب */

        /* About Section */
        .about { padding: 20px; font-family: "Arial", sans-serif; color: #444; }

        /* Image Section */
        .img-container { text-align: center; padding: 20px; }
        img { width: 400px; border: 3px solid #002147; border-radius: 10px; }

        /* Table */
        table { width: 80%; margin: 20px auto; border-collapse: collapse; text-align: center; background: white; }
        table, th, td { border: 1px solid #ddd; }
        th { background-color: #002147; color: white; padding: 10px; }
        td { padding: 10px; }

        /* Form */
        .reg-form { width: 50%; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #002147; color: white; padding: 10px 20px; border: none; cursor: pointer; }

        /* Footer */
        footer { background: #222; color: #ddd; text-align: center; padding: 15px; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <h1>دورة تدريب جوجل XX</h1>
</header>

<nav>
    <a href="https://youtube.com/1">دورة HTML</a>
    <a href="https://youtube.com/2">دورة CSS</a>
    <a href="https://youtube.com/3">دورة JS</a>
</nav>

<section class="about">
    <h2>عن الدورة</h2>
    <p>هذه الدورة تهدف إلى تعليم مهارات جوجل الأساسية والبرمجة للمبتدئين.</p>
</section>

<div class="img-container">
    <img src="https://via.placeholder.com/400" alt="Course Image">
</div>

<table>
    <tr>
        <th>اسم الدورة</th>
        <th>عدد الساعات</th>
        <th>المستوى</th>
    </tr>
    <tr>
        <td>Google Tools</td>
        <td>30</td>
        <td>Advanced</td>
    </tr>
</table>

<section class="reg-form">
    <h3>سجل الآن</h3>
    <input type="text" placeholder="الاسم الكامل">
    <input type="email" placeholder="البريد الإلكتروني">
    <input type="number" placeholder="العمر">
    <button type="submit">إرسال</button>
</section>

<footer>
    <p>اسم الطالب: [ضع اسمك هنا]</p>
    <p>الرقم الجامعي: [ضع رقمك هنا]</p>
</footer>

</body>
</html>
