<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course 40</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; margin:0; }
        header { background:#0b3d91; color:white; text-align:center; padding:20px; }
        nav { background:#1e3c72; display:flex; justify-content:center; padding:10px; }
        nav a { color:white; margin:0 10px; text-decoration:none; }
        nav a:hover { color:#ffcc00; }
        #about { padding:20px; text-align:center; color:#333; }
        #image-section { text-align:center; margin:20px; }
        #image-section img { width:300px; border:3px solid #0b3d91; border-radius:5px; }
        table { width:80%; margin:20px auto; border-collapse: collapse; }
        th, td { border:2px solid #0b3d91; padding:8px; text-align:center; }
        th { background:#0b3d91; color:white; }
        #registration { width:50%; margin:20px auto; padding:20px; border:2px solid #0b3d91; border-radius:5px; background:white; }
        #registration input { width:100%; padding:8px; margin:5px 0; border:2px solid #0b3d91; border-radius:3px; }
        #registration input[type="submit"] { background:#0b3d91; color:white; cursor:pointer; }
        #registration input[type="submit"]:hover { background:#ffcc00; color:black; }
        footer { background:#0b3d91; color:white; text-align:center; padding:10px; }
    </style>
</head>
<body>

<header>
    <h1>Course XX</h1>
</header>

<nav>
    <a href="#">Course 1</a>
    <a href="#">Course 2</a>
    <a href="#">Course 3</a>
</nav>

<section id="about">
    <p>Welcome to Course XX! Learn new skills and improve your knowledge.</p>
</section>

<section id="image-section">
    <img src="https://via.placeholder.com/300x200.png?text=Course+Image" alt="Course Image">
</section>

<table>
    <tr><th>Course Name</th><th>Hours</th><th>Level</th></tr>
    <tr><td>Course 1</td><td>20</td><td>Beginner</td></tr>
    <tr><td>Course 2</td><td>30</td><td>Intermediate</td></tr>
    <tr><td>Course 3</td><td>40</td><td>Advanced</td></tr>
</table>

<section id="registration">
    <form>
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
        <input type="number" placeholder="Age" required>
        <input type="submit" value="Register">
    </form>
</section>

<footer>
    <p>Malek Alastal | 120251840</p>
</footer>

</body>
</html>
